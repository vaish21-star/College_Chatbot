{% extends "layout.html" %}
{% block body_class %}auth-body{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-visual">
    <div class="auth-logo">SVP</div>
    <h2>Welcome to SVP College Portal</h2>
    <p>Join the AI/ML chatbot system to access campus info, syllabus help, and support.</p>
    <div class="auth-art">
      <div class="orb orb-lg"></div>
      <div class="orb orb-md"></div>
      <div class="orb orb-sm"></div>
      <div class="plate"></div>
      <div class="rod"></div>
    </div>
  </div>
  <div class="auth-form">
    <div class="auth-top">English (UK)</div>
    <h2>Create Account</h2>
    <form method="POST" action="/student/signup">
      <label>Full Name</label>
      <input type="text" name="name" required />
      <label>Roll Number</label>
      <input type="text" name="roll" required />
      <label>Email Address</label>
      <input type="email" name="email" required />
      <label>Password</label>
      <input type="password" name="password" required />
      <button class="primary-btn auth-btn" type="submit">Send OTP</button>
    </form>
    <div class="auth-foot">Already have an account? <a href="/student/login">Log in</a></div>
  </div>
</section>
{% endblock %}
